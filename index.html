<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIME - LoL Draft Tool</title>
    
    <link rel="icon" type="image/webp" href="logo.webp">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="team-branding">
                <img src="logo.webp" alt="RIME Logo" class="team-logo">
                <h1>RIME Draft Planner</h1>
            </div>
            
            <div class="strat-management">
                <button class="btn-manage new" onclick="createNewStrategy()">➕ New Strategy</button>
                <button class="btn-manage delete" onclick="deleteCurrentStrategy()">🗑️ Delete Strategy</button>
                <button class="btn-manage" style="color: #a09b8c;" onclick="openPatchNotes()">📝 Patch Notes</button>
            </div>

            <div class="header-controls">
                <div class="strategy-selector">
                    <label for="strategy-dropdown">Current Strategy: </label>
                    <select id="strategy-dropdown" onchange="loadStrategy()"></select>
                </div>
                <button id="edit-btn" class="btn-edit" onclick="toggleEditMode()">✏️ Edit Draft</button>
            </div>
            
            <p id="strategy-desc" class="desc-text" title="Click to edit description" onclick="editDescription()"></p>
        </header>

        <div class="active-draft-panel">
            
            <div class="flex-picks-container">
                <h3>🔄 Flex Options</h3>
                <div class="flex-list" id="flex-picks-list">
                    </div>
            </div>

            <div class="contested-picks-container">
                <h3>⚠️ Priority Pick/Ban</h3>
                <div class="flex-list" id="contested-picks-list">
                    </div>
            </div>

            <div class="locked-team-container">
                <h3>🔒 Selected Team</h3>
                <div class="locked-team" id="locked-team">
                    </div>
            </div>

        </div>

        <div class="draft-board" id="draft-board">

            </div>

    </div>

    <datalist id="champion-names"></datalist>

    <div id="patch-notes-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePatchNotes()">❌</span>
            <h2>🛠️ RIME Patch Notes</h2>
            <div id="patch-notes-list">
                <p>Loading server data...</p>
            </div>
        </div>
    </div>

    <datalist id="champion-names"></datalist>

    <script type="module" src="script.js" defer></script>
</body>
</html>

    <script type="module" src="script.js" defer></script>
</body>
</html>
